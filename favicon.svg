<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" role="img" aria-label="Terminal prompt">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#161b22"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
  </defs>
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>
  <rect x="1" y="1" width="30" height="30" rx="6" fill="none" stroke="#30363d" stroke-width="1" opacity="0.9"/>
  <!-- >_ style prompt -->
  <path
    d="M9.5 10.5 L15.2 16 9.5 21.5"
    fill="none"
    stroke="#00ff9f"
    stroke-width="2.25"
    stroke-linecap="round"
    stroke-linejoin="round"/>
  <rect x="17.5" y="20" width="9" height="2.25" rx="0.5" fill="#00ff9f"/>
  <!-- status dot (shell running) -->
  <circle cx="26.5" cy="8.5" r="1.35" fill="#79c0ff" opacity="0.75"/>
</svg>
